<div class="page-shell">
  <div class="logo-container">
    <img src="/assets/images/Pulse-Logo.svg" alt="Pulse Logo" class="logo-icon" />
  </div>

  <div class="page-container">
    <mat-card class="surface-card">
      <mat-card-header>
        <div class="login-title-group">
          <mat-card-title>Sign in to your account</mat-card-title>
          <p class="login-subtitle">Welcome back! Please enter your details.</p>
        </div>
      </mat-card-header>

      <mat-card-content>
        <div class="error-banner" *ngIf="authService.error()">
          {{ authService.error() }}
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
          <div class="input-group">
            <span class="field-label">Email</span>
            <mat-form-field appearance="outline" class="full-width">
              <input matInput type="email" formControlName="email" placeholder="you@company.com" />
              <mat-error *ngIf="form.get('email')?.hasError('required')">
                Email is required
              </mat-error>
              <mat-error *ngIf="form.get('email')?.hasError('email')">
                Enter a valid email address
              </mat-error>
            </mat-form-field>
          </div>

          <div class="input-group">
            <span class="field-label">Password</span>
            <mat-form-field appearance="outline" class="full-width">
              <input
                matInput
                [type]="hidePassword() ? 'password' : 'text'"
                formControlName="password"
                placeholder="••••••••"
              />
              <button
                mat-icon-button
                matSuffix
                type="button"
                (click)="togglePasswordVisibility($event)"
                [attr.aria-label]="hidePassword() ? 'Show password' : 'Hide password'"
                [attr.aria-pressed]="hidePassword()"
              >
                <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
              </button>
              <mat-error *ngIf="form.get('password')?.hasError('required')">
                Password is required
              </mat-error>
            </mat-form-field>
          </div>

          <app-button
            label="Sign in"
            variant="full-width"
            type="primary"
            [disabled]="form.invalid"
          />
        </form>
      </mat-card-content>
    </mat-card>
  </div>

  <mat-card-actions class="login-card-actions">
    <p class="login-note">
      Don't have an account?
      <a routerLink="/register" class="link-primary">Sign up</a>
    </p>
  </mat-card-actions>
</div>
